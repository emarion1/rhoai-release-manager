name: Update Release Plan

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8 AM UTC
  workflow_dispatch:  # Allow manual triggers
  push:
    branches:
      - main
    paths:
      - 'release_manager.py'
      - 'auto_scheduler.py'

jobs:
  update-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Generate release plan
        env:
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          python3 release_manager.py
      
      - name: Commit and push if changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add release-manager.html
git diff --quiet && git diff --staged --quiet || (git commit -m "Update release plan [automated]" && git pull --rebase && git push)
